{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div style="max-width:460px;margin:48px auto">
  <div style="text-align:center;margin-bottom:28px">
    <div style="font-size:40px;margin-bottom:10px">🏦</div>
    <h1 style="font-family:'Syne',sans-serif;font-size:24px;font-weight:800">Open Your SafeBank Account</h1>
    <p style="color:var(--muted);margin-top:6px;font-size:14px">Takes 30 seconds. Protected by AI fraud detection.</p>
  </div>

  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="full_name" placeholder="e.g. Ravi Kumar" required>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" name="phone" placeholder="10-digit mobile number">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Min 6 characters" minlength="6" required>
      </div>
      <div class="form-group">
        <label>Opening Deposit (₹) — minimum ₹500</label>
        <input type="number" name="initial_deposit" placeholder="e.g. 10000" min="500" required>
      </div>
      <button type="submit" class="btn btn-success btn-full" style="margin-top:8px">
        🏦 Create My Account
      </button>
    </form>
    <hr class="sep">
    <p style="text-align:center;font-size:13px;color:var(--muted)">
      Already have an account? <a href="/login">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
